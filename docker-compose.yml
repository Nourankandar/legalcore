
services:
  db:
    image: postgres:15
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}

  redis:
    image: redis:7-alpine

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://user:pass@db:5432/legalcore_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: celery -A legalcore worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgres://user:pass@db:5432/legalcore_db
      - REDIS_URL=redis://redis:6379/0
      # - DATABASE_URL=postgres://user:password@db:5432/dbname
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    command: celery -A legalcore beat --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

volumes:
  postgres_data: